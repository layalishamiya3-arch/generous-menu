<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ليالي شامية — القائمة الفاخرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

:root {
  --gold: #D4AF37;
  --gold2: #F3E5AB;
  --gold-light: rgba(212, 175, 55, 0.1);
  --black: #0B0C10;
  --black2: #1F2833;
  --black3: #12161F;
  --white: #FFFFFF;
  --gray: #9AA0A6;
  --border: rgba(214, 175, 55, 0.15);
  --glass: rgba(31, 40, 51, 0.65);
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* LOADING - تصميم أنيق وعصري */
#loading {
  position: fixed;
  inset: 0;
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  gap: 2rem;
}
.loading-flower {
  font-size: 3.5rem;
  animation: spinFlower 3s linear infinite, pulseGlow 2s ease-in-out infinite;
}
.loading-bar {
  width: 160px;
  height: 3px;
  background: rgba(214, 175, 55, 0.1);
  border-radius: 10px;
  overflow: hidden;
}
.loading-bar-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 10px;
  animation: fillBar 2s ease-out forwards;
}
@keyframes spinFlower { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes pulseGlow { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
@keyframes fillBar { 0% { width: 0; } 100% { width: 100%; } }
#loading p {
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 0.2em;
  font-weight: 600;
}

/* LANG SWITCHER - تأثير زجاجي طافي */
.lang-bar {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid var(--border);
  padding: 4px;
  border-radius: 30px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}
.lang-btn {
  background: none;
  border: none;
  color: var(--gray);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 6px 18px;
  font-family: 'Cairo', sans-serif;
  border-radius: 20px;
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: var(--black);
  box-shadow: 0 4px 15px rgba(214, 175, 55, 0.3);
}

/* LOGIN - واجهة دخول بطابع فخم */
#page-login {
  display: none;
  min-height: 100vh;
}
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  background: radial-gradient(circle at center, #1b1c22 0%, var(--black) 100%);
}
.login-box {
  width: 420px;
  max-width: 100%;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 2.5rem;
  border-radius: 24px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.login-logo-area img {
  width: 140px;
  height: auto;
  object-fit: contain;
}
.login-tagline {
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-top: 10px;
  font-weight: 500;
}
.login-divider-gold {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.5rem auto;
}
.login-field {
  margin-bottom: 1.25rem;
}
.login-field label {
  font-size: 12px;
  color: var(--white);
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
}
.login-field input {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 14px;
  font-family: 'Cairo', sans-serif;
  color: var(--white);
  outline: none;
}
.login-field input:focus {
  border-color: var(--gold);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 0 3px var(--gold-light);
}
.login-btn-gold {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: var(--black);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  box-shadow: 0 5px 20px rgba(214, 175, 55, 0.25);
}
.login-btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 7px 25px rgba(214, 175, 55, 0.35);
}

/* CUSTOMER MENU - واجهة المنيو للزبائن */
#page-menu {
  display: none;
  padding-top: 80px;
}
.menu-hero {
  background: linear-gradient(180deg, rgba(31, 40, 51, 0.5) 0%, var(--black) 100%);
  padding: 3rem 1.5rem 2rem;
  text-align: center;
}
.menu-hero img {
  width: 160px;
  animation: pulseGlow 3s ease-in-out infinite;
}
.menu-cats-wrap {
  background: rgba(11, 12, 16, 0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 75px;
  z-index: 90;
  padding: 15px;
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.menu-cat-btn {
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 8px 22px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  white-space: nowrap;
}
.menu-cat-btn.active {
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: var(--black);
  font-weight: 700;
  border-color: var(--gold);
}

/* القائمة وعرض كروت الطعام */
.menu-items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
  padding: 1.5rem;
}
.menu-item-card {
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.menu-item-card:hover {
  transform: translateY(-5px);
  border-color: var(--gold);
  box-shadow: 0 15px 35px rgba(214, 175, 55, 0.15);
}
.menu-item-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-bottom: 1px solid var(--border);
}
.menu-item-body {
  padding: 20px;
}
.menu-item-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}
.menu-item-desc {
  font-size: 13px;
  color: var(--gray);
  margin-top: 6px;
  line-height: 1.6;
}
.menu-item-price {
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
  margin-top: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ADMIN DASHBOARD - لوحة تحكم عصرية */
.admin-layout {
  display: flex;
  min-height: 100vh;
  padding-top: 70px;
}
.admin-sidebar {
  width: 260px;
  background: var(--black3);
  border-left: 1px solid var(--border);
  position: fixed;
  top: 70px;
  right: 0;
  bottom: 0;
  padding: 20px;
}
.sidebar-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  color: var(--gray);
  border: none;
  background: none;
  width: 100%;
  text-align: right;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
}
.sidebar-btn:hover, .sidebar-btn.active {
  background: var(--gold-light);
  color: var(--gold);
  font-weight: 600;
}
.admin-main {
  flex: 1;
  margin-right: 260px;
  padding: 2rem;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.5rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.stat-label {
  color: var(--gold);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}
.stat-val {
  font-size: 32px;
  font-weight: 700;
  margin-top: 10px;
}

/* شاشات الهواتف الذكية */
@media(max-width: 768px) {
  .admin-layout { flex-direction: column; }
  .admin-sidebar { width: 100%; position: relative; top: 0; }
  .admin-main { margin-right: 0; padding: 1rem; }
  .stats-row { grid-template-columns: 1fr; }
  .menu-items-grid { grid-template-columns: 1fr; gap: 15px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-flower">✨</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <p>LAYALI SHAMIYA</p>
</div>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('tr')">Türkçe</button>
</div>

</body>
</html>
