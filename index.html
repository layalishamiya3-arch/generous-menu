<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ليالي شامية — القائمة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
}

:root {
  --gold: #D4AF37;
  --gold2: #F3E5AB;
  --gold-light: rgba(214, 175, 55, 0.12);
  --black: #0B0C10;
  --black2: #141923;
  --black3: #1F2833;
  --white: #FAFAF8;
  --gray: #9AA0A6;
  --border: rgba(214, 175, 55, 0.2);
  --glass: rgba(20, 25, 35, 0.7);
  --radius-lg: 20px;
  --radius-md: 12px;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  inset: 0;
  background: var(--black);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  gap: 1.5rem;
}
.loading-flower {
  font-size: 3rem;
  animation: spinFlower 4s linear infinite, pulseGlow 2s ease-in-out infinite;
}
@keyframes spinFlower { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes pulseGlow { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }

.loading-bar {
  width: 140px;
  height: 3px;
  background: rgba(214, 175, 55, 0.1);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.loading-bar-fill {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 50%;
  background: linear-gradient(90deg, var(--gold2), var(--gold));
  border-radius: 10px;
  animation: barMove 1.5s ease-in-out infinite alternate;
}
@keyframes barMove { 0% { right: -10%; } 100% { right: 60%; } }

/* LANGUAGE BAR */
.lang-bar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  padding: 4px;
  border-radius: 40px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
.lang-btn {
  background: none;
  border: none;
  color: var(--gray);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 6px 18px;
  font-family: 'Cairo', sans-serif;
  border-radius: 30px;
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: #000;
  font-weight: 700;
  box-shadow: 0 4px 12px rgba(214, 175, 55, 0.3);
}

/* TOP HEADER */
.top-header {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
}
.admin-trigger-btn {
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--gold);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.admin-trigger-btn:hover {
  background: var(--gold-light);
  border-color: var(--gold);
  transform: translateY(-2px);
}

/* LOGIN PAGE */
#page-login {
  display: none;
  min-height: 100vh;
}
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(circle at center, #161d26 0%, var(--black) 100%);
}
.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
}
.login-logo img {
  width: 130px;
  height: auto;
  margin-bottom: 10px;
}
.login-title {
  font-size: 14px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 2rem;
}
.form-group {
  text-align: right;
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-size: 12px;
  margin-bottom: 6px;
  color: var(--gray);
  font-weight: 500;
}
.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  color: var(--white);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  outline: none;
}
.form-group input:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 0 3px var(--gold-light);
}
.login-actions {
  display: flex;
  gap: 10px;
  margin-top: 2rem;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-md);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: #000;
  font-weight: 700;
  box-shadow: 0 4px 15px rgba(214,175,55,0.2);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(214,175,55,0.3);
}
.btn-secondary {
  background: var(--black3);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover {
  background: rgba(255,255,255,0.05);
}

/* MENU PAGE */
#page-menu {
  display: none;
  padding-top: 90px;
}
.venue-hero {
  text-align: center;
  padding: 2rem 1rem;
  background: linear-gradient(180deg, rgba(20,25,35,0.4) 0%, var(--black) 100%);
}
.venue-logo-wrap img {
  width: 150px;
  height: auto;
  animation: pulseGlow 3s ease-in-out infinite;
}
.venue-title-sub {
  font-size: 13px;
  color: var(--gold);
  margin-top: 8px;
  letter-spacing: 3px;
  font-weight: 600;
}

/* CATEGORIES BAR */
.cats-outer {
  position: sticky;
  top: 0;
  z-index: 800;
  background: rgba(11, 12, 16, 0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.cats-container {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 0 15px;
  scrollbar-width: none;
}
.cats-container::-webkit-scrollbar { display: none; }
.cat-btn {
  background: var(--black2);
  border: 1px solid var(--border);
  color: var(--gray);
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
}
.cat-btn.active {
  background: linear-gradient(135deg, var(--gold), #AA7C11);
  color: #000;
  font-weight: 700;
  border-color: var(--gold);
  box-shadow: 0 4px 12px rgba(214,175,55,0.25);
}

/* ITEMS GRID */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 25px;
  padding: 20px;
}
.item-card {
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  position: relative;
}
.item-card:hover {
  border-color: var(--gold);
  transform: translateY(-4px);
  box-shadow: 0 15px 35px rgba(214,175,55,0.15);
}
.item-img-container {
  width: 100%;
  height: 210px;
  background: var(--black3);
  position: relative;
  overflow: hidden;
}
.item-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.item-info {
  padding: 20px;
}
.item-title-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.item-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}
.item-emoji {
  font-size: 18px;
}
.item-desc {
  font-size: 13px;
  color: var(--gray);
  margin-top: 8px;
  line-height: 1.6;
  min-height: 40px;
}
.item-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
  padding-top: 15px;
  border-top: 1px solid rgba(214, 175, 55, 0.1);
}
.item-price {
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
}

/* ADMIN DASHBOARD */
.admin-header {
  background: var(--black2);
  border-bottom: 1px solid var(--border);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
}
.admin-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
}
.admin-container {
  display: flex;
  padding-top: 75px;
  min-height: 100vh;
}
.admin-sidebar {
  width: 260px;
  background: #0f131a;
  border-left: 1px solid var(--border);
  padding: 20px;
}
.sidebar-menu-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 15px;
  background: none;
  border: none;
  color: var(--gray);
  text-align: right;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: 6px;
}
.sidebar-menu-btn:hover, .sidebar-menu-btn.active {
  background: var(--gold-light);
  color: var(--gold);
  font-weight: 600;
}
.admin-content {
  flex: 1;
  padding: 2rem;
  background: var(--black);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 2rem;
}
.stat-box {
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
}
.stat-box-title {
  font-size: 12px;
  color: var(--gray);
  font-weight: 600;
}
.stat-box-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  margin-top: 5px;
}

/* TABLES & ACTIONS */
.admin-actions-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}
.table-responsive {
  width: 100%;
  overflow-x: auto;
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
table {
  width: 100%;
  border-collapse: collapse;
  text-align: right;
  font-size: 14px;
}
th, td {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(214, 175, 55, 0.1);
}
th {
  background: rgba(214, 175, 55, 0.05);
  color: var(--gold);
  font-weight: 600;
}
tr:hover td {
  background: rgba(255,255,255,0.01);
}

/* MODAL & FORMS */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-window {
  background: #141822;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 550px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 25px;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(214,175,55,0.1);
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
}

/* TOAST NOTIFICATION */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, #AA7C11, var(--gold));
  color: #000;
  padding: 12px 30px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 10px 25px rgba(214,175,55,0.4);
  z-index: 99999;
  opacity: 0;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* RESPONSIVE DESIGN */
@media (max-width: 768px) {
  .admin-container { flex-direction: column; }
  .admin-sidebar { width: 100%; padding: 10px; border-left: none; border-bottom: 1px solid var(--border); }
  .sidebar-menu-btn { justify-content: center; }
  .admin-content { padding: 15px; }
  .stats-grid { grid-template-columns: 1fr; gap: 10px; }
  .items-grid { grid-template-columns: 1fr; gap: 15px; padding: 15px; }
  .admin-actions-bar { flex-direction: column; gap: 10px; align-items: stretch; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-flower">✨</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('tr')">Türkçe</button>
</div>

<div class="top-header" id="top-header">
  <button class="admin-trigger-btn" onclick="goToLogin()" id="btn-admin-gate">لوحة التحكم</button>
</div>

<div id="page-login">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo"><img src="" id="login-logo-img" alt="Logo"></div>
      <div class="login-title" id="login-title">تسجيل دخول المشرف</div>
      <div class="form-group">
        <label id="lbl-username">اسم المستخدم</label>
        <input type="text" id="username">
      </div>
      <div class="form-group">
        <label id="lbl-password">
